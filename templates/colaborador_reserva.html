{% extends 'base_colaborador.html' %}

{% block title %}Nova Reserva Balcão - Sistema Interno{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-10">
        <h2 class="fw-bold mb-4 text-dark">Lançar Nova Reserva (Balcão / Telefone)</h2>

        <div class="card shadow border-0 border-top border-4 border-info">
            <div class="card-body p-5">
                <form method="POST" action="#">
                    
                    <h5 class="fw-bold text-info mb-3">1. Identificação do Cliente</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" placeholder="Nome do hóspede" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Documento (BI/Cartão Cidadão)</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Telefone de Contacto</label>
                            <input type="tel" class="form-control" placeholder="+351..." required>
                        </div>
                    </div>

                    <hr class="text-muted mb-4">

                    <h5 class="fw-bold text-info mb-3">2. Detalhes da Estadia</h5>
                    <div class="row g-3 mb-3">
                        <div class="col-md-12">
                            <label class="form-label">Tipo de Quarto Solicitado</label>
                            <select class="form-select" required>
                                <option value="" selected disabled>Selecione a categoria...</option>
                                <option value="standard">Quarto Standard (€ 150,00)</option>
                                <option value="executive">Quarto Executive Family (€ 280,00)</option>
                                <option value="suite">Master Suite Elfsong (€ 450,00)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Data de Entrada (Check-in)</label>
                            <input type="date" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data de Saída (Check-out)</label>
                            <input type="date" class="form-control" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Adultos</label>
                            <input type="number" class="form-control" min="1" max="3" value="1" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Crianças</label>
                            <input type="number" class="form-control" min="0" max="2" value="0" required>
                        </div>
                        <div class="col-md-4 align-self-end">
                            <div class="form-check form-switch fs-5 mt-2">
                                <input class="form-check-input" type="checkbox" id="comCafe" checked>
                                <label class="form-check-label fs-6" for="comCafe">Incluir Pequeno-almoço</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top">
                        <button type="button" class="btn btn-light border">Cancelar</button>
                        <button type="submit" class="btn btn-info text-white fw-bold px-5">Confirmar e Gravar Reserva</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
