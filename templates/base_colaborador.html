<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Painel do Colaborador{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Estilos específicos para o painel administrativo */
        .sidebar {
            min-height: 100vh;
            width: 260px;
            background-color: #212529; /* Escuro padrão do Bootstrap */
        }
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 500;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }
        .content-area {
            height: 100vh;
            overflow-y: auto;
            background-color: #f8f9fa; /* Fundo cinza bem claro para leitura fácil */
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar p-3 d-flex flex-column shadow">
            <a href="#" class="text-white text-decoration-none fs-5 fw-bold mb-4 text-center border-bottom border-secondary pb-3">
                Hotel Elfsong <br><span class="fs-6 fw-normal text-warning">Área Interna</span>
            </a>
            
            <ul class="nav flex-column mb-auto">
                <small class="text-muted text-uppercase fw-bold mb-2 px-2">Operação Diária</small>
                <li class="nav-item mb-1">
                    <a href="{{ url_for('colaborador_inicio') }}" class="nav-link text-white fw-bold">Dashboard </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="{{ url_for('colaborador_mapa') }}" class="nav-link">Mapa de Quartos</a>
                </li>
                <li class="nav-item mb-3">
                    <a href="{{ url_for('colaborador_fluxo') }}" class="nav-link">Check-In / Check-Out</a>
                </li>
                <small class="text-muted text-uppercase fw-bold mb-2 px-2 mt-2">Administração</small>
                <li class="nav-item mb-1">
                    <a href="{{ url_for('gerente_cadastro') }}" class="nav-link">Cadastro de Estrutura</a>
                </li>
                <li class="nav-item mb-3">
                    <a href="{{ url_for('gerente_faturamento') }}" class="nav-link">Faturamento</a>
                </li>
                <li class="nav-item mb-1">
                    <a href="{{ url_for('colaborador_reserva') }}" class="nav-link text-info fw-bold">+ Nova Reserva</a>
                </li>
            </ul>
            
            <hr class="text-secondary">
            <a href="{{ url_for('login') }}" class="nav-link text-danger fw-bold">Sair do Sistema</a>
        </div>

        <div class="content-area flex-grow-1 p-5">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
